syntax = "proto3";
package layer.reporter;

import "amino/amino.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/tellor-io/layer/x/reporter/types";

// Selection is a type that represents a  delegator's selection
message Selection {
  // reporter is the address of the reporter being delegated to
  bytes reporter = 1;
  // locked_until_time — non-dispute / legacy stake exclusion only (e.g. pre-upgrade switch locks).
  google.protobuf.Timestamp locked_until_time = 2 [
    (gogoproto.nullable) = false,
    (gogoproto.stdtime) = true
  ];
  // delegations_count is the number of delegations to the reporter
  uint64 delegations_count = 3;
  // switch_out_locked_until_block is the block height until which this selector
  // cannot initiate another reporter switch while a handoff is incomplete: it
  // stores the oracle snapshot (max open query expiration for the outgoing
  // reporter at schedule time). Cleared when the pending switch is finalized.
  uint64 switch_out_locked_until_block = 4;
  // dispute_locked_until — dispute jail only; max on set; never copied to locked_until_time.
  google.protobuf.Timestamp dispute_locked_until = 5 [
    (gogoproto.nullable) = false,
    (gogoproto.stdtime) = true
  ];
}

// Pending switch keyed by (outgoing_reporter, selector) in keeper collections.
message PendingSwitchEntry {
  bytes to_reporter = 1;
  uint64 unlock_block = 2;
}

// Single-reporter summary for O(1) checks in ReporterStake: one Get per reporter
// to see if any pending switch involving this reporter may be ready at height.
message ReporterPendingSwitchHead {
  uint32 outgoing_count = 1;
  uint64 outgoing_min_unlock = 2;
  uint32 incoming_count = 3;
  uint64 incoming_min_unlock = 4;
}

// IndividualDelegation represents a single delegation to a validator
message IndividualDelegation {
  // validator_address is the address of the validator
  string validator_address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // amount is the delegation amount in tokens
  string amount = 2 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

// FormattedSelection is a type that represents a selector's information for the SelectionsTo query
message FormattedSelection {
  // selector is the address of the selector
  string selector = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // locked_until_time is the time until which the tokens are locked before they
  // can be used for reporting again
  google.protobuf.Timestamp locked_until_time = 2 [
    (gogoproto.nullable) = false,
    (gogoproto.stdtime) = true
  ];
  // delegations_count is the number of delegations the selector has made to validators
  uint64 delegations_count = 3;
  // delegations_total is the total power of the delegations the selector has made to validators
  string delegations_total = 4 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  // individual_delegations contains details of each delegation (only populated when delegations_count > 1)
  repeated IndividualDelegation individual_delegations = 5;
  // dispute_locked_until — dispute jail only (query surface).
  google.protobuf.Timestamp dispute_locked_until = 6 [
    (gogoproto.nullable) = false,
    (gogoproto.stdtime) = true
  ];
}

message SelectorShare {
  bytes selector_address = 1;
  string amount = 2 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

message PeriodRewardData {
  repeated SelectorShare selectors = 1;
  string total = 2 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  string reward_amount = 3[
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
  bytes hash = 4;
}

message DistributionQueueItem {
  bytes reporter = 1;
  repeated SelectorShare selectors = 2;
  string total = 3 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  string reward_amount = 4 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
}

message DistributionQueueCounter {
  uint64 head = 1;
  uint64 tail = 2;
}